model_name: wan
generator_fsdp_wrap_strategy: size
real_score_fsdp_wrap_strategy: size
fake_score_fsdp_wrap_strategy: size
text_encoder_fsdp_wrap_strategy: size
generator_grad:
  model: true
real_score_grad:
  model: false
fake_score_grad:
  model: true
denoising_step_list:
- 1000
- 900
- 757
- 522
num_train_timestep: 1000
timestep_shift: 5.0
real_guidance_scale: 5.0
generator_task: bidirectional_video
real_task_type: bidirectional_video
fake_task_type: bidirectional_video
denoising_loss_type: flow
mixed_precision: true
seed: 314
wandb_host: https://api.wandb.ai
wandb_key: your_key
wandb_entity: your_entity
wandb_project: ADV
wandb_name: wan_bidirectional_dmd_from_scratch
sharding_strategy: full
lr: 2.0e-06
beta1: 0.9
beta2: 0.999
data_path: ./pandas_lmdb
batch_size: 1
log_iters: 500
negative_prompt: '色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走'
dfake_gen_update_ratio: 5
image_or_video_shape:
- 1
- 21
- 16
- 60
- 104
output_path: ./wan_bidirectional_dmd_from_scratch
distillation_loss: dmd
gradient_checkpointing: true
backward_simulation: false
# generator_ckpt: ./dmd1.3b/model.pt
# fake_score_ckpt: ./dmd1.3b/model.pt
use_vif: False